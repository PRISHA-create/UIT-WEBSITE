<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UIT | Innovation in Motion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo"><strong>UIT</strong></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Innovation<br>In Every Kick.</h1>
            <p style="color:var(--text-dim); margin-top:20px; font-size:1.2rem;">UIT: The ultimate interface for your business growth.</p>
        </div>
        
    </header>

    <section id="next" class="bento-grid reveal">
        <div class="card wide"><h2>Marketing Excellence</h2><p>Results-driven strategies for modern brands.</p></div>
        <div class="card"><h2>Tech Solutions</h2><p>High-speed web & IT infrastructure.</p></div>
    </section>

    <script>
        function kickOff() {
            document.getElementById('kickPlayer').classList.add('kick-away');
            setTimeout(() => { document.getElementById('next').scrollIntoView(); }, 600);
        }
        window.addEventListener('scroll', () => {
            const reveals = document.querySelectorAll('.reveal');
            reveals.forEach(r => {
                let windowHeight = window.innerHeight;
                let revealTop = r.getBoundingClientRect().top;
                if (revealTop < windowHeight - 150) { r.classList.add('active'); }
            });
        });
    </script>
</body>
</html>
